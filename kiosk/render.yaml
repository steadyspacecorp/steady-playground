# Render blueprint for the Steady Kiosk.
#
# When creating the Blueprint instance, set "Blueprint Path" to
# kiosk/render.yaml -- Render defaults to looking for render.yaml at the
# repo root, but this monorepo keeps each app's blueprint in its own folder.

services:
  - type: web
    name: steady-kiosk
    runtime: docker
    rootDir: kiosk
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /up
    envVars:
      - key: STEADY_PAT
        sync: false # prompted at deploy time; never committed
      - key: STEADY_SCOPE
        value: my # "my" = the token's teams; "all" = every team the token can see
      - key: STEADY_TEAM_IDS
        value: "" # optional: comma-separated team UUIDs; overrides STEADY_SCOPE
      - key: TZ
        value: America/New_York # "today" for check-ins is resolved in this zone
      - key: POLL_SECONDS
        value: "30"
